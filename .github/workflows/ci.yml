name: Continous Integration 
on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_USER}}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ secrets.DOCKERHUB_USER != '' && format('{0}/skillpulse-backend:latest', secrets.DOCKERHUB_USER) || 'skillpulse-backend:latest' }}
            ${{ secrets.DOCKERHUB_USER != '' && format('{0}/skillpulse-backend:{1}', secrets.DOCKERHUB_USER, github.sha) || format('skillpulse-backend:{0}', github.sha) }}

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ secrets.DOCKERHUB_USER  != '' && format('{0}/skillpulse-frontend:latest', secrets.DOCKERHUB_USER) || 'skillpulse-frontend:latest' }}
            ${{ secrets.DOCKERHUB_USER  != '' && format('{0}/skillpulse-frontend:{1}', secrets.DOCKERHUB_USER, github.sha) || format('skillpulse-frontend:{0}', github.sha) }}
