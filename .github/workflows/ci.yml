name: Continous Integration 
on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD}}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ vars.DOCKERHUB_USER != '' && format('{0}/skillpulse-backend:latest', vars.DOCKERHUB_USER) || 'skillpulse-backend:latest' }}
            ${{  vars.DOCKERHUB_USER!= '' && format('{0}/skillpulse-backend:{1}', vars.DOCKERHUB_USER, github.sha) || format('skillpulse-backend:{0}', github.sha) }}

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }} 
            ${{vars.DOCKERHUB_USER != '' && format('{0}/skillpulse-frontend:latest', vars.DOCKERHUB_USER) || 'skillpulse-frontend:latest' }}
               ${{ vars.DOCKERHUB_USER != '' && format('{0}/skillpulse-frontend:{1}', vars.DOCKERHUB_USER, github.sha) || format('skillpulse-frontend:{0}', github.sha) }}
